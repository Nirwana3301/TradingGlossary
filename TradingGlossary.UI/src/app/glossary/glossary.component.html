<div class="mx-auto max-w-5xl px-4 py-12">
  <div class="mb-8 flex items-center gap-3 border-b border-neutral-800 pb-4">
    <div class="h-2 w-2 animate-pulse bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.8)]"></div>
    <h2 class="font-mono text-xl font-bold uppercase tracking-widest text-neutral-300">
      Index
    </h2>
  </div>

  <div class="flex flex-col gap-4">
    @for (letter of glossaryLetters(); track letter.id) {
      <glossary-letter [glossaryLetter]="letter"></glossary-letter>
    } @empty {
      <div class="flex flex-col items-center justify-center rounded-xl border border-neutral-800/50 bg-neutral-900/20 py-20 text-center">
        <svg class="mb-4 h-10 w-10 text-neutral-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
        </svg>
        <p class="font-mono text-sm tracking-widest text-neutral-500 uppercase">Keine Einträge gefunden.</p>
      </div>
    }
  </div>
</div>
