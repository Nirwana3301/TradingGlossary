<div (click)="toggleIsOpen()">
  {{ glossaryLetter().code | uppercase }}
</div>
@if(isOpen())
{
  <div>
    {{ glossaryLetter().code | uppercase }} - isOpen
  </div>
  @for (glossaryEntry of glossaryEntries(); track glossaryEntry)
  {
    <glossary-entry [glossaryEntry]="glossaryEntry"></glossary-entry>
  }
}
