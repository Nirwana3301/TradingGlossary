<div class="relative min-h-screen bg-black text-white">

  <om-flickering-grid
    class="fixed inset-0 z-0 pointer-events-none"
    [squareSize]="4"
    [gridGap]="6"
    [flickerChance]="0.3"
    color="#4f46e5"
    [maxOpacity]="0.15"
  ></om-flickering-grid>

  <main class="relative z-10 min-h-screen w-full">
    <router-outlet></router-outlet>
  </main>

</div>
